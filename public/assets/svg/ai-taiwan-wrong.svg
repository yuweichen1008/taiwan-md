<svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
  <!-- AI 典型錯誤：形狀太圓、比例失真、缺少細節 -->
  <g fill="#ff6b6b" stroke="#333" stroke-width="1">
    <!-- 主島（錯誤形狀：過於簡化和圓潤） -->
    <ellipse cx="50" cy="60" rx="25" ry="35" />
    <!-- 澎湖（位置錯誤：太靠近主島） -->
    <circle cx="20" cy="55" r="3" />
    <circle cx="18" cy="58" r="2" />
    <circle cx="22" cy="57" r="1.5" />
    <!-- 金門（位置完全錯誤：放在東邊） -->
    <circle cx="78" cy="50" r="2" />
    <!-- 馬祖（缺失） -->
  </g>
  <!-- 標示為錯誤 -->
  <text x="50" y="110" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff6b6b">
    AI 生成 (錯誤)
  </text>
</svg>